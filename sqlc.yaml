version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema:
      - "migrations/0001_initial.up.sql"
      - "migrations/0003_cost_lifecycle.up.sql"
      - "migrations/0004_pack_completeness.up.sql"
      - "migrations/0005_supersede_on_regenerate.up.sql"
      - "migrations/0007_budget_period_reset.up.sql"
      - "migrations/0008_rate_limits.up.sql"
    gen:
      go:
        package: "dbgen"
        out: "internal/db/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_pointers_for_null_types: true
