              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/places/{place_id}/visual-identity:
    post:
      tags: [Places]
      summary: Create or update place visual identity
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVisualIdentityRequest'
      responses:
        '200':
          description: Visual identity created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualIdentity'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Places]
      summary: Get place visual identity
      security:
        - BearerAuth: [images:read]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
      responses:
        '200':
          description: Visual identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualIdentity'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/places/{place_id}/generate-pack:
    post:
      tags: [Places]
      summary: Generate place starter pack
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePlacePackRequest'
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/artifacts/{artifact_id}/generate:
    post:
      tags: [Artifacts]
      summary: Generate artifact image
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
