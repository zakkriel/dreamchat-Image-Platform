openapi: 3.1.0
info:
  title: DreamChat Image Platform API
  version: 0.2.0
  description: |
    Standalone API for generating, storing, retrieving, and versioning persistent visual assets for DreamChat worlds.

    ## Canonical contract

    This file is the single source of truth for the DreamChat Image Platform API.
    Any other OpenAPI fragment (for example in `prds/schemas/`) is illustrative only
    and must defer to this contract.

    ## Tenant handling

    For normal API calls, `tenant_id` is **inferred from the bearer token** and must
    NOT be passed in request bodies. The auth middleware resolves token → tenant on
    every request. Admin endpoints may accept `tenant_id` as an optional filter.

    ## Resource scoping

    Entity IDs (`character_id`, `place_id`, `artifact_id`, `asset_id`, `job_id`,
    `style_id`) are path parameters for resource-scoped operations. They must not
    be duplicated in request bodies.

    ## Idempotency

    Generation endpoints accept `Idempotency-Key` so client retries do not create
    duplicate jobs. See `idempotency.md`.

    ## Docs

    The service serves this contract at `GET /openapi.json` and a Swagger UI at
    `GET /docs` (see ADR-015).
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://image-api.dreamchat.ai
    description: Production
security:
  - BearerAuth: []
tags:
  - name: Health
  - name: Docs
  - name: Characters
  - name: Places
  - name: Artifacts
  - name: Assets
  - name: Jobs
  - name: Styles
  - name: Models
  - name: Admin
paths:
  /health:
    get:
      tags: [Health]
      security: []
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /openapi.json:
    get:
      tags: [Docs]
      security: []
      summary: Canonical OpenAPI contract (JSON)
      description: |
        Returns this OpenAPI document as JSON. Public in local/dev. In production
        this endpoint is gated behind admin auth or a feature flag (see ADR-015).
      responses:
        '200':
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /docs:
    get:
      tags: [Docs]
      security: []
      summary: Swagger UI for the canonical contract
      description: |
        Serves a Swagger UI (or Redoc) page rendered from `/openapi.json`.
        Public in local/dev; gated in production.
      responses:
        '200':
          description: HTML documentation page
          content:
            text/html:
              schema:
                type: string
  /v1/characters/{character_id}/visual-identity:
    post:
      tags: [Characters]
      summary: Create or update character visual identity
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/CharacterId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVisualIdentityRequest'
      responses:
        '200':
          description: Visual identity created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualIdentity'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Characters]
      summary: Get character visual identity
      security:
        - BearerAuth: [images:read]
      parameters:
        - $ref: '#/components/parameters/CharacterId'
      responses:
        '200':
          description: Visual identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualIdentity'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/characters/{character_id}/generate-pack:
    post:
      tags: [Characters]
      summary: Generate character starter pack
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/CharacterId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateCharacterPackRequest'
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/places/{place_id}/visual-identity:
    post:
      tags: [Places]
      summary: Create or update place visual identity
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVisualIdentityRequest'
      responses:
        '200':
          description: Visual identity created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualIdentity'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Places]
      summary: Get place visual identity
      security:
        - BearerAuth: [images:read]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
      responses:
        '200':
          description: Visual identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualIdentity'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/places/{place_id}/generate-pack:
    post:
      tags: [Places]
      summary: Generate place starter pack
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/PlaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePlacePackRequest'
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/artifacts/{artifact_id}/generate:
    post:
      tags: [Artifacts]
      summary: Generate artifact image
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/ArtifactId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateArtifactRequest'
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/assets/search:
    post:
      tags: [Assets]
      summary: Search reusable visual assets
      security:
        - BearerAuth: [images:read]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetSearchRequest'
      responses:
        '200':
          description: Asset search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetSearchResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/assets/{asset_id}:
    get:
      tags: [Assets]
      summary: Get asset by ID
      security:
        - BearerAuth: [images:read]
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Visual asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisualAsset'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/assets/{asset_id}/regenerate:
    post:
      tags: [Assets]
      summary: Regenerate an asset as a new generation job
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get generation job status
      security:
        - BearerAuth: [jobs:read]
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Generation job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJob'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/styles:
    get:
      tags: [Styles]
      summary: List style profiles
      security:
        - BearerAuth: [styles:read]
      responses:
        '200':
          description: List of style profiles
          content:
            application/json:
              schema:
                type: object
                required: [styles]
                properties:
                  styles:
                    type: array
                    items:
                      $ref: '#/components/schemas/StyleProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Styles]
      summary: Create style profile
      security:
        - BearerAuth: [styles:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStyleProfileRequest'
      responses:
        '201':
          description: Style profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StyleProfile'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/styles/{style_id}/preview:
    post:
      tags: [Styles]
      summary: Generate style preview
      security:
        - BearerAuth: [images:write]
      parameters:
        - $ref: '#/components/parameters/StyleId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Generation job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobAccepted'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/models:
    get:
      tags: [Models]
      summary: List available provider models
      security:
        - BearerAuth: [models:read]
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                type: object
                required: [models]
                properties:
                  models:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProviderModel'
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
      description: |
        DreamChat API token in `Authorization: Bearer <token>` form. Tokens carry
        scopes (`images:read`, `images:write`, `jobs:read`, `styles:read`,
        `styles:write`, `models:read`, `admin:*`). The auth middleware resolves
        token → tenant_id; clients must not send `tenant_id` in request bodies.
  parameters:
    CharacterId:
      name: character_id
      in: path
      required: true
      schema: { type: string }
    PlaceId:
      name: place_id
      in: path
      required: true
      schema: { type: string }
    ArtifactId:
      name: artifact_id
      in: path
      required: true
      schema: { type: string }
    AssetId:
      name: asset_id
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: job_id
      in: path
      required: true
      schema: { type: string }
    StyleId:
      name: style_id
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, maxLength: 128 }
      description: |
        Client-generated idempotency key. The same key + token + endpoint + body
        hash returns the same job. Same key + different body returns 409.
        See `idempotency.md`.
  responses:
    ErrorResponse:
      description: Error response (RFC 7807 Problem Details)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    # ------------------------------------------------------------------------
    # Canonical reusable enums. All endpoints and schemas reference these by
    # $ref instead of inlining enum values. Any new enum value must be added
    # here first.
    # ------------------------------------------------------------------------
    GenerationJobStatus:
      type: string
      description: Lifecycle status of a generation job.
      enum:
        - queued
        - running
        - preview_ready
        - completed
        - failed
        - cancelled
    QualityTier:
      type: string
      description: Output quality tier requested for generation.
      enum:
        - draft
        - standard
        - high
      default: standard
    LatencyTier:
      type: string
      description: Latency preference for provider routing.
      enum:
        - fast
        - balanced
        - quality
      default: balanced
    AssetType:
      type: string
      description: Kind of visual asset.
      enum:
        - character_portrait
        - place_scene
        - artifact
        - expression
        - angle_variant
    AssetStatus:
      type: string
      description: Lifecycle status of a stored visual asset.
      enum:
        - pending
        - preview_ready
        - ready
        - failed
        - archived
    StyleMode:
      type: string
      description: How a style profile is sourced.
      enum:
        - open_prompt
        - preset_style
        - creator_style
        - provider_native
    ProviderCapability:
      type: string
      description: Capability tier of a provider model used by the router.
      enum:
        - draft_only
        - scene_capable
        - identity_capable
        - pack_capable
        - production_capable
    OwnerType:
      type: string
      description: Owning entity of a visual identity.
      enum:
        - character
        - place
        - artifact
    # ------------------------------------------------------------------------
    # Health & error
    # ------------------------------------------------------------------------
    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, example: ok }
    ProblemDetails:
      type: object
      required: [type, title, status, detail, request_id]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        request_id: { type: string }
    # ------------------------------------------------------------------------
    # Visual identity
    # ------------------------------------------------------------------------
    CreateVisualIdentityRequest:
      type: object
      required: [world_id, owner_type, owner_id, display_name, canonical_visual_traits, style_profile_id]
      properties:
        world_id: { type: string }
        owner_type:
          $ref: '#/components/schemas/OwnerType'
        owner_id: { type: string }
        display_name: { type: string }
        canonical_visual_traits:
          type: object
          additionalProperties: true
        style_profile_id: { type: string }
        consistency_key: { type: string }
    VisualIdentity:
      type: object
      required: [id, world_id, owner_type, owner_id, display_name, style_profile_id, current_version, status]
      properties:
        id: { type: string }
        world_id: { type: string }
        owner_type:
          $ref: '#/components/schemas/OwnerType'
        owner_id: { type: string }
        display_name: { type: string }
        canonical_visual_traits:
          type: object
          additionalProperties: true
        style_profile_id: { type: string }
        consistency_key: { type: string }
        anchor_asset_ids:
          type: array
          items: { type: string }
        current_version: { type: integer }
        status: { type: string, enum: [active, archived] }
    # ------------------------------------------------------------------------
    # Generation requests
    # ------------------------------------------------------------------------
    GenerateCharacterPackRequest:
      type: object
      required: [world_id, style_profile_id]
      properties:
        world_id: { type: string }
        style_profile_id: { type: string }
        quality_tier:
          $ref: '#/components/schemas/QualityTier'
        latency_tier:
          $ref: '#/components/schemas/LatencyTier'
        variant_keys:
          type: array
          items: { type: string }
    GeneratePlacePackRequest:
      type: object
      required: [world_id, style_profile_id]
      properties:
        world_id: { type: string }
        style_profile_id: { type: string }
        quality_tier:
          $ref: '#/components/schemas/QualityTier'
        latency_tier:
          $ref: '#/components/schemas/LatencyTier'
        variant_keys:
          type: array
          items: { type: string }
    GenerateArtifactRequest:
      type: object
      required: [world_id, style_profile_id, description]
      properties:
        world_id: { type: string }
        style_profile_id: { type: string }
        description: { type: string }
        quality_tier:
          $ref: '#/components/schemas/QualityTier'
        latency_tier:
          $ref: '#/components/schemas/LatencyTier'
    # ------------------------------------------------------------------------
    # Jobs
    # ------------------------------------------------------------------------
    GenerationJobAccepted:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string }
        status:
          type: string
          enum: [queued]
    GenerationJob:
      type: object
      required: [id, status, job_type, created_at, updated_at]
      properties:
        id: { type: string }
        status:
          $ref: '#/components/schemas/GenerationJobStatus'
        job_type: { type: string }
        visual_identity_id: { type: string }
        preview_asset_ids:
          type: array
          items: { type: string }
        final_asset_ids:
          type: array
          items: { type: string }
        error_code: { type: string }
        error_message: { type: string }
        retryable: { type: boolean }
        cost_estimate_usd: { type: string }
        actual_cost_usd: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    # ------------------------------------------------------------------------
    # Assets
    # ------------------------------------------------------------------------
    AssetSearchRequest:
      type: object
      properties:
        world_id: { type: string }
        owner_type:
          $ref: '#/components/schemas/OwnerType'
        owner_id: { type: string }
        visual_identity_id: { type: string }
        asset_type:
          $ref: '#/components/schemas/AssetType'
        variant_key: { type: string }
        version: { type: integer }
        style_profile_id: { type: string }
    AssetSearchResponse:
      type: object
      required: [assets]
      properties:
        match_type:
          type: string
          description: |
            Telemetry hint describing how the best result was found. `exact` means
            owner+variant+version+style all matched; `variant` means a compatible
            variant was substituted; `fallback` means a usable but non-matching
            asset was returned; `miss` means nothing matched.
          enum: [exact, variant, fallback, miss]
        generation_recommended:
          type: boolean
          description: |
            True when the client should follow up with a generate-pack request
            (e.g. because only a fallback or variant was returned).
        assets:
          type: array
          items:
            $ref: '#/components/schemas/VisualAsset'
    VisualAsset:
      type: object
      required: [id, asset_type, variant_key, version, status]
      properties:
        id: { type: string }
        visual_identity_id: { type: string }
        world_id: { type: string }
        asset_type:
          $ref: '#/components/schemas/AssetType'
        variant_key: { type: string }
        version: { type: integer }
        status:
          $ref: '#/components/schemas/AssetStatus'
        low_res_url: { type: string }
        high_res_url: { type: string }
        thumbnail_url: { type: string }
        provider_id: { type: string }
        model_id: { type: string }
        prompt_hash: { type: string }
        seed: { type: string }
        metadata:
          type: object
          additionalProperties: true
    # ------------------------------------------------------------------------
    # Styles
    # ------------------------------------------------------------------------
    CreateStyleProfileRequest:
      type: object
      required: [name, style_mode, positive_prompt]
      properties:
        name: { type: string }
        style_mode:
          $ref: '#/components/schemas/StyleMode'
        positive_prompt: { type: string }
        negative_prompt: { type: string }
        default_quality_tier:
          $ref: '#/components/schemas/QualityTier'
    StyleProfile:
      type: object
      required: [id, name, style_mode, positive_prompt]
      properties:
        id: { type: string }
        name: { type: string }
        style_mode:
          $ref: '#/components/schemas/StyleMode'
        positive_prompt: { type: string }
        negative_prompt: { type: string }
        default_quality_tier:
          $ref: '#/components/schemas/QualityTier'
        status: { type: string, enum: [active, archived] }
    # ------------------------------------------------------------------------
    # Provider models
    # ------------------------------------------------------------------------
    ProviderModel:
      type: object
      required: [id, provider_id, display_name, capabilities, status]
      properties:
        id: { type: string }
        provider_id: { type: string }
        display_name: { type: string }
        capabilities:
          type: array
          description: Capability tiers this model satisfies (used by the router).
          items:
            $ref: '#/components/schemas/ProviderCapability'
        supports_preview: { type: boolean }
        supports_high_res: { type: boolean }
        status: { type: string, enum: [active, degraded, disabled] }

# ----------------------------------------------------------------------------
# Confidence to Implement
#
# Score: 95/100 — Very High (was 88 before OpenAPI drift was resolved)
#
# This is now the single canonical contract. All entity IDs are path
# parameters, tenant_id is inferred from the bearer token (never in body),
# every enum (GenerationJobStatus, QualityTier, AssetType, AssetStatus,
# StyleMode, ProviderCapability, OwnerType, LatencyTier) lives in
# `components.schemas` and is referenced by $ref so adding a new value is
# a one-line edit. Bearer auth, RFC 7807 ProblemDetails, Idempotency-Key,
# /openapi.json, and /docs are all defined. Spec passes openapi-spec-validator
# against the OpenAPI 3.1.0 schema; all 76 internal $refs resolve.
#
# Suitable for direct codegen with oapi-codegen / ogen.
#
# Why not 100: `canonical_visual_traits` and VisualAsset.metadata remain
# free-form `object` (intentional — PRDs 03 and 04 define their shape
# loosely). That's the only ambiguity remaining for an implementer.
# ----------------------------------------------------------------------------
