name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: install sqlc
        run: |
          curl -fsSL https://github.com/sqlc-dev/sqlc/releases/download/v1.27.0/sqlc_1.27.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin sqlc

      - name: make generate
        run: make generate

      - name: assert generated files are committed
        run: git diff --exit-code

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install validator
        run: pip install "openapi-spec-validator==0.7.1"
      - name: validate openapi
        run: openapi-spec-validator docs/api/openapi.yaml
      - name: validate openapi mirror
        run: openapi-spec-validator api/openapi.yaml
      - name: assert mirror matches source
        run: diff -q docs/api/openapi.yaml api/openapi.yaml

  sqlc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install sqlc
        run: |
          curl -fsSL https://github.com/sqlc-dev/sqlc/releases/download/v1.27.0/sqlc_1.27.0_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin sqlc
      - name: sqlc vet
        run: sqlc vet

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: image_platform
          POSTGRES_PASSWORD: image_platform
          POSTGRES_DB: image_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U image_platform"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # MinIO is run as a regular docker container (not a GitHub services
      # container) because the services entry has no way to override the
      # image command — the official minio/minio image needs `server /data`
      # as its argv and there's no service-block field for that.
      - name: start minio
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-10-13T13-34-11Z \
            server /data --console-address ":9001"

      - name: wait for minio
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "minio ready"; exit 0
            fi
            sleep 1
          done
          echo "minio did not become ready"
          docker logs minio || true
          exit 1

      - name: install mc and create bucket
        env:
          MC_HOST_local: http://minioadmin:minioadmin@localhost:9000
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc
          mc mb --ignore-existing local/image-platform
          mc ls local/

      - name: apply migrations (goose)
        env:
          POSTGRES_DSN: postgres://image_platform:image_platform@localhost:5432/image_platform?sslmode=disable
        run: go run ./cmd/migrate up

      - name: assert all expected tables exist
        env:
          PGPASSWORD: image_platform
        run: |
          count=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'")
          echo "table count: $count"
          # 21 baseline objects (20 tables + goose_db_version) + 3 Chunk 1 tables
          # (sprite_sheet_contract, sprite_sheet_slice, identity_cost_ledger) = 24.
          test "$count" = "24"

      - name: assert goose version is the baseline head
        env:
          PGPASSWORD: image_platform
        run: |
          v=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT max(version_id) FROM goose_db_version WHERE is_applied")
          echo "goose version: $v"
          # Chunk 1 added migrations 0012-0017; head is now 17.
          test "$v" = "17"

      - name: assert migrations round-trip above baseline (up -> down-to 11 -> up)
        env:
          POSTGRES_DSN: postgres://image_platform:image_platform@localhost:5432/image_platform?sslmode=disable
          PGPASSWORD: image_platform
        run: |
          set -euo pipefail
          go run ./cmd/migrate down-to 11
          v=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT max(version_id) FROM goose_db_version WHERE is_applied")
          test "$v" = "11" || { echo "ERROR: after down-to, version=$v (want 11)"; exit 1; }
          count=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'")
          test "$count" = "21" || { echo "ERROR: after down-to, table count=$count (want 21)"; exit 1; }
          for tbl in sprite_sheet_contract sprite_sheet_slice identity_cost_ledger; do
            n=$(psql -h localhost -U image_platform -d image_platform -tAc \
              "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_name='$tbl'")
            test "$n" = "0" || { echo "ERROR: $tbl still present after down-to 11"; exit 1; }
          done
          go run ./cmd/migrate up
          v=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT max(version_id) FROM goose_db_version WHERE is_applied")
          test "$v" = "17" || { echo "ERROR: after re-up, version=$v (want 17)"; exit 1; }
          count=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'")
          test "$count" = "24" || { echo "ERROR: after re-up, table count=$count (want 24)"; exit 1; }

      - name: assert down-guard refuses crossing below baseline
        env:
          POSTGRES_DSN: postgres://image_platform:image_platform@localhost:5432/image_platform?sslmode=disable
        run: |
          if go run ./cmd/migrate down-to 10; then
            echo "ERROR: down-to 10 was allowed (should be refused below baseline)"; exit 1
          fi
          echo "down-to 10 correctly refused"

      - name: assert RLS enabled+forced on Chunk 1 tables
        env:
          PGPASSWORD: image_platform
        run: |
          for tbl in sprite_sheet_contract sprite_sheet_slice identity_cost_ledger; do
            state=$(psql -h localhost -U image_platform -d image_platform -tAc \
              "SELECT (relrowsecurity AND relforcerowsecurity)::int FROM pg_class WHERE relname = '$tbl'")
            test "$state" = "1" || { echo "ERROR: $tbl not RLS enabled+forced (state=$state)"; exit 1; }
            pol=$(psql -h localhost -U image_platform -d image_platform -tAc \
              "SELECT count(*) FROM pg_policies WHERE tablename = '$tbl' AND policyname = 'tenant_isolation'")
            test "$pol" = "1" || { echo "ERROR: $tbl missing tenant_isolation policy"; exit 1; }
          done

      - name: assert fal provider seed present (migration 0011)
        env:
          PGPASSWORD: image_platform
        run: |
          model=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_models WHERE id = 'pm_fal_flux_kontext_multi' AND provider_id = 'fal'")
          route=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_routes WHERE id = 'route_fal_text_to_image_pack' AND required_capability = 'pack_capable'")
          test "$model" = "1"
          test "$route" = "1"

      - name: assert budget period_start column exists
        env:
          PGPASSWORD: image_platform
        run: |
          cols=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.columns
             WHERE table_name = 'cost_budgets'
               AND column_name = 'period_start'")
          test "$cols" = "1"

      - name: assert supersede column exists
        env:
          PGPASSWORD: image_platform
        run: |
          cols=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.columns
             WHERE table_name = 'visual_assets'
               AND column_name = 'superseded_by_asset_id'")
          test "$cols" = "1"

      - name: assert pack completeness columns exist
        env:
          PGPASSWORD: image_platform
        run: |
          cols=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.columns
             WHERE table_name = 'asset_packs'
               AND column_name IN ('required_roles', 'delivered_roles', 'missing_roles')")
          test "$cols" = "3"

      - name: assert cost reservation budget holds table exists
        env:
          PGPASSWORD: image_platform
        run: |
          exists=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM information_schema.tables WHERE table_name = 'cost_reservation_budget_holds'")
          test "$exists" = "1"

      - name: assert api_tokens rate-limit columns exist (Phase 7C-2)
        env:
          PGPASSWORD: image_platform
        run: |
          cols=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT count(*) FROM information_schema.columns
             WHERE table_name = 'api_tokens'
               AND column_name IN ('rate_limit_rpm', 'rate_limit_rph', 'max_concurrent_jobs')")
          test "$cols" = "3"

      - name: assert concurrent-job index exists (Phase 7C-2)
        env:
          PGPASSWORD: image_platform
        run: |
          exists=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM pg_indexes WHERE indexname = 'idx_generation_jobs_token_status'")
          test "$exists" = "1"

      - name: assert idempotency expires index exists
        env:
          PGPASSWORD: image_platform
        run: |
          exists=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM pg_indexes WHERE indexname = 'idx_idempotency_keys_expires'")
          test "$exists" = "1"

      - name: assert single-active-price index exists
        env:
          PGPASSWORD: image_platform
        run: |
          exists=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM pg_indexes WHERE indexname = 'idx_provider_model_prices_one_active'")
          test "$exists" = "1"

      - name: assert mock provider seed present
        env:
          PGPASSWORD: image_platform
        run: |
          model=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_models WHERE id = 'pm_mock_v1' AND status = 'active'")
          route=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_routes WHERE id = 'route_mock_text_to_image_standard'")
          price=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_model_prices WHERE id = 'price_mock_text_to_image_001' AND is_active = true AND unit_type = 'image'")
          test "$model" = "1"
          test "$route" = "1"
          test "$price" = "1"

      - name: assert bfl + pack-capable seed present (Phase 7A)
        env:
          PGPASSWORD: image_platform
        run: |
          # BFL model: present, active, and conservative (no high-res — matches
          # the adapter's Capabilities().SupportsHighRes=false).
          model=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_models WHERE id = 'pm_bfl_flux_pro_11' AND provider_id = 'bfl' AND status = 'active' AND supports_high_res = false")
          route=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_routes WHERE id = 'route_bfl_text_to_image_standard' AND is_enabled = true AND required_capability = 'scene_capable'")
          price=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_model_prices WHERE id = 'price_bfl_text_to_image_001' AND is_active = true AND unit_type = 'image'")
          # pack_capable mock route (capability-aware routing for pack generation).
          packroute=$(psql -h localhost -U image_platform -d image_platform -tAc \
            "SELECT 1 FROM provider_routes WHERE id = 'route_mock_text_to_image_pack' AND provider_id = 'mock' AND required_capability = 'pack_capable' AND is_enabled = true")
          test "$model" = "1"
          test "$route" = "1"
          test "$price" = "1"
          test "$packroute" = "1"

      - name: assert single-active-price index is enforced
        env:
          PGPASSWORD: image_platform
        run: |
          # A second active price for the same (provider, model, operation)
          # must be rejected by idx_provider_model_prices_one_active.
          if psql -h localhost -U image_platform -d image_platform -v ON_ERROR_STOP=1 -c \
            "INSERT INTO provider_model_prices (id, provider_id, model_id, operation_type, unit_type, price_per_unit, effective_from, is_active) VALUES ('price_dup', 'mock', 'pm_mock_v1', 'text_to_image', 'image', 0.02, now(), true)" 2>/dev/null; then
            echo "ERROR: duplicate active price was allowed"; exit 1
          fi
          echo "duplicate active price correctly rejected"

      # Phase 7C-3: prove RLS is ENABLED + FORCED and the policies exist. The
      # migration created the image_platform_api (RLS-enforced) and
      # image_platform_system (BYPASSRLS) roles; the next steps prove enforcement
      # under the non-superuser API role (superuser/owner checks bypass RLS and
      # would prove nothing).
      - name: assert RLS enabled+forced and policies exist
        env:
          PGPASSWORD: image_platform
        run: |
          for tbl in generation_jobs visual_assets api_tokens cost_reservations idempotency_keys asset_pack_items; do
            state=$(psql -h localhost -U image_platform -d image_platform -tAc \
              "SELECT (relrowsecurity AND relforcerowsecurity)::int FROM pg_class WHERE relname = '$tbl'")
            test "$state" = "1" || { echo "ERROR: $tbl not RLS enabled+forced (state=$state)"; exit 1; }
            pol=$(psql -h localhost -U image_platform -d image_platform -tAc \
              "SELECT count(*) FROM pg_policies WHERE tablename = '$tbl' AND policyname = 'tenant_isolation'")
            test "$pol" = "1" || { echo "ERROR: $tbl missing tenant_isolation policy"; exit 1; }
          done
          # Global reference tables must NOT have RLS enabled.
          for tbl in provider_models provider_routes provider_model_prices; do
            en=$(psql -h localhost -U image_platform -d image_platform -tAc \
              "SELECT relrowsecurity::int FROM pg_class WHERE relname = '$tbl'")
            test "$en" = "0" || { echo "ERROR: global $tbl must not have RLS"; exit 1; }
          done

      - name: assert RLS enforced under non-superuser API role
        run: |
          set -euo pipefail
          # Seed two tenants' rows as the owner (bypass), then assert isolation,
          # deny-by-default, and WITH CHECK as image_platform_api.
          PGPASSWORD=image_platform psql -h localhost -U image_platform -d image_platform -v ON_ERROR_STOP=1 -c \
            "INSERT INTO generation_jobs (id, tenant_id, job_type, status) VALUES
               ('ci_rls_a','ci_tenant_a','artifact','queued'),
               ('ci_rls_b','ci_tenant_b','artifact','queued')
             ON CONFLICT (id) DO NOTHING"
          # tenant A (GUC set via PGOPTIONS) sees only its own row.
          a=$(PGPASSWORD=image_platform_api PGOPTIONS="-c app.current_tenant=ci_tenant_a" \
            psql -h localhost -U image_platform_api -d image_platform -tAc "SELECT count(*) FROM generation_jobs")
          test "$a" = "1" || { echo "ERROR: tenant A saw $a rows (want 1)"; exit 1; }
          # Unset GUC sees zero (deny-by-default).
          z=$(PGPASSWORD=image_platform_api \
            psql -h localhost -U image_platform_api -d image_platform -tAc "SELECT count(*) FROM generation_jobs")
          test "$z" = "0" || { echo "ERROR: unset GUC saw $z rows (want 0)"; exit 1; }
          # WITH CHECK blocks a cross-tenant insert under GUC=tenant_a.
          if PGPASSWORD=image_platform_api PGOPTIONS="-c app.current_tenant=ci_tenant_a" \
            psql -h localhost -U image_platform_api -d image_platform -v ON_ERROR_STOP=1 \
            -c "INSERT INTO generation_jobs (id, tenant_id, job_type, status) VALUES ('ci_rls_x','ci_tenant_b','artifact','queued')" 2>/dev/null; then
            echo "ERROR: WITH CHECK allowed a cross-tenant insert"; exit 1
          fi
          # The system (BYPASSRLS) role sees both tenants.
          s=$(PGPASSWORD=image_platform_system \
            psql -h localhost -U image_platform_system -d image_platform -tAc "SELECT count(*) FROM generation_jobs")
          test "$s" -ge "2" || { echo "ERROR: system role saw $s rows (want >=2)"; exit 1; }
          PGPASSWORD=image_platform psql -h localhost -U image_platform -d image_platform -c \
            "DELETE FROM generation_jobs WHERE id IN ('ci_rls_a','ci_rls_b','ci_rls_x')"

      - name: assert RLS blocks cross-tenant access to governance-column rows
        run: |
          set -euo pipefail
          # Seed a governance-bearing row for ci_tenant_b as the owner (bypass).
          PGPASSWORD=image_platform psql -h localhost -U image_platform -d image_platform -v ON_ERROR_STOP=1 -c \
            "INSERT INTO generation_jobs (id, tenant_id, job_type, status, classification_id, governance_envelope)
             VALUES ('ci_gov_b', 'ci_tenant_b', 'artifact', 'queued', 'cls_ci_gov', '{\"schema_version\":\"1\"}')
             ON CONFLICT (id) DO UPDATE
               SET classification_id = EXCLUDED.classification_id,
                   governance_envelope = EXCLUDED.governance_envelope"
          # image_platform_api with GUC=ci_tenant_a must see count=0 for that row.
          g=$(PGPASSWORD=image_platform_api PGOPTIONS="-c app.current_tenant=ci_tenant_a" \
            psql -h localhost -U image_platform_api -d image_platform -tAc \
            "SELECT count(*) FROM generation_jobs WHERE id = 'ci_gov_b'")
          test "$g" = "0" || { echo "ERROR: tenant_a saw $g governance rows owned by tenant_b (want 0)"; exit 1; }
          # Clean up.
          PGPASSWORD=image_platform psql -h localhost -U image_platform -d image_platform -c \
            "DELETE FROM generation_jobs WHERE id = 'ci_gov_b'"

      - name: integration tests
        env:
          # The pre-existing suite runs on the system/owner DSN (bypasses RLS).
          POSTGRES_DSN: postgres://image_platform:image_platform@localhost:5432/image_platform?sslmode=disable
          # The Phase 7C-3 RLS-enforcement + tenant-executor tests run on the
          # non-superuser, RLS-enforced API role.
          POSTGRES_API_DSN: postgres://image_platform_api:image_platform_api@localhost:5432/image_platform?sslmode=disable
          REDIS_ADDR: localhost:6379
          S3_BUCKET: image-platform
          S3_REGION: us-east-1
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_USE_PATH_STYLE: "true"
        run: go test -tags=integration ./...

      - name: minio logs on failure
        if: failure()
        run: docker logs minio || true
